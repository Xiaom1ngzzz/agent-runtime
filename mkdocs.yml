site_name: Agent Runtime
site_description: 从第一原理构建 Agent Runtime
site_url: https://xiaom1ngzzz.github.io/agent-runtime/
repo_url: https://github.com/Xiaom1ngzzz/agent-runtime
repo_name: Xiaom1ngzzz/agent-runtime
edit_uri: edit/master/

# docs/ 里全部是指向仓库真实内容的符号链接,让原文里的 ../adr/../chapters/ 相对链接继续能走通。
docs_dir: docs
# 构建产物目录;.gitignore 会排除。
site_dir: site

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - footnotes
  - attr_list
  - md_in_html

plugins:
  - search:
      lang:
        - zh
        - en

nav:
  - 首页: index.md
  - 关于本书:
      - 目标与写作原则: BOOK.md
      - 路线图: ROADMAP.md
      - 风格指南: STYLE_GUIDE.md
  - 第一部分 · 基础:
      - 第 1 章 · 运行时领域模型: chapters/ch01-runtime-domain.md
      - 第 2 章 · 运行时数据流: chapters/ch02-runtime-dataflow.md
      - 第 3 章 · 状态与事件模型: chapters/ch03-state-event.md
  - 第二部分 · 上下文系统:
      - 第 4 章 · 上下文引擎: chapters/ch04-context-engine.md
      - 第 5 章 · 记忆架构: chapters/ch05-memory.md
      - 第 6 章 · Prompt 编译器: chapters/ch06-prompt-compiler.md
  - 第三部分 · 执行系统:
      - 第 7 章 · 规划器与任务图: chapters/ch07-planner.md
      - 第 8 章 · 执行器: chapters/ch08-executor.md
      - 第 9 章 · 检查点与恢复: chapters/ch09-checkpoint.md
  - 第四部分 · 演进:
      - 第 10 章 · 评测与优化: chapters/ch10-eval.md
  - 架构决策:
      - ADR 模板: adr/ADR-000.md
      - ADR-001 · Runtime 边界与职责: adr/ADR-001-runtime-domain.md
      - ADR-002 · Runtime 数据流协议: adr/ADR-002-dataflow-protocol.md
      - ADR-003 · Runtime 与 DDD 对应关系: adr/ADR-003-ddd-mapping.md
      - ADR-004 · 任务图与 Saga: adr/ADR-004-task-graph-saga.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Xiaom1ngzzz/agent-runtime
